version: '3.7'

services:
  airflow:
    image: apache/airflow:2.7.1
    container_name: airflow
    restart: always

    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ../:/opt/project   # 👈 your project code

    ports:
      - "8080:8080"

    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin --firstname a --lastname b --role Admin --email a@a.com &&
      airflow webserver & airflow scheduler
      "